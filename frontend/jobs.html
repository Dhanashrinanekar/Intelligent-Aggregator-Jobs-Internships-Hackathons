<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - AI Job Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-briefcase me-2"></i>AI Job Aggregator
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/login">Login</a>
                <a class="nav-link" href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">Browse Jobs</h1>

        <!-- Search Filters -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="keyword" placeholder="Search keyword...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="jobType">
                            <option value="">All Types</option>
                            <option value="job">Job</option>
                            <option value="internship">Internship</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="portal">
                            <option value="">All Portals</option>
                            <option value="Indeed">Indeed</option>
                            <option value="Naukri">Naukri</option>
                            <option value="Jooble">Jooble</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" id="searchBtn">
                            <i class="fas fa-search me-2"></i>Search
                        </button>
                    </div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-secondary" id="clearBtn">
                        <i class="fas fa-times me-1"></i>Clear Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="jobsContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Loading jobs...</p>
            </div>
        </div>

        <!-- Pagination -->
        <nav id="pagination" style="display: none;">
            <ul class="pagination justify-content-center">
                <!-- Pagination will be inserted here -->
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        const limit = 20;

        // Load jobs on page load
        loadJobs();

        // Search button click
        document.getElementById('searchBtn').addEventListener('click', () => {
            currentPage = 1;
            loadJobs();
        });

        // Clear filters button
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('keyword').value = '';
            document.getElementById('jobType').value = '';
            document.getElementById('portal').value = '';
            currentPage = 1;
            loadJobs();
        });

        // Allow Enter key to search
        document.getElementById('keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentPage = 1;
                loadJobs();
            }
        });

        async function loadJobs() {
            const keyword = document.getElementById('keyword').value.trim();
            const jobType = document.getElementById('jobType').value;
            const portal = document.getElementById('portal').value;

            const params = new URLSearchParams({
                page: currentPage,
                limit: limit
            });

            if (keyword) params.append('keyword', keyword);
            if (jobType) params.append('opportunity_type', jobType);
            if (portal) params.append('portal', portal);

            // Debug log
            console.log('🔍 Searching with filters:', {
                keyword: keyword || 'none',
                jobType: jobType || 'all',
                portal: portal || 'all',
                page: currentPage
            });

            try {
                const response = await fetch(`/api/jobs/search?${params}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('✅ Jobs loaded:', data.total, 'total jobs');

                displayJobs(data.jobs);
                displayPagination(data.total_pages, data.page);
            } catch (error) {
                console.error('❌ Error loading jobs:', error);
                document.getElementById('jobsContainer').innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-exclamation-triangle me-2"></i>Error loading jobs</h5>
                        <p>${error.message}</p>
                        <button class="btn btn-sm btn-danger" onclick="loadJobs()">
                            <i class="fas fa-redo me-1"></i>Try Again
                        </button>
                    </div>
                `;
            }
        }

        function displayJobs(jobs) {
            const container = document.getElementById('jobsContainer');

            if (!jobs || jobs.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center">
                        <i class="fas fa-info-circle fa-3x mb-3 text-info"></i>
                        <h5>No jobs found</h5>
                        <p class="mb-3">Try adjusting your search criteria</p>
                        <button class="btn btn-primary" onclick="clearFilters()">
                            <i class="fas fa-times me-2"></i>Clear All Filters
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => `
                <div class="card mb-3 shadow-sm job-card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-9">
                                <h5 class="card-title mb-2">${escapeHtml(job.role)}</h5>
                                <p class="text-muted mb-2">
                                    <i class="fas fa-building me-2"></i>${escapeHtml(job.company_name)}
                                </p>
                                <div class="mb-2">
                                    <span class="badge bg-primary me-2">
                                        <i class="fas fa-briefcase me-1"></i>${escapeHtml(job.opportunity_type)}
                                    </span>
                                    <span class="badge bg-info me-2">
                                        <i class="fas fa-globe me-1"></i>${escapeHtml(job.job_portal_name)}
                                    </span>
                                    ${job.experience_required && job.experience_required !== 'Not specified' ? 
                                        `<span class="badge bg-secondary">
                                            <i class="fas fa-clock me-1"></i>${escapeHtml(job.experience_required)}
                                        </span>` : ''}
                                </div>
                                <p class="small text-muted mb-0">
                                    <i class="fas fa-cogs me-1"></i><strong>Skills:</strong> ${escapeHtml(job.skills)}
                                </p>
                            </div>
                            <div class="col-md-3 text-end d-flex flex-column justify-content-center">
                                <a href="${escapeHtml(job.application_link)}" target="_blank" class="btn btn-primary mb-2">
                                    <i class="fas fa-external-link-alt me-2"></i>Apply Now
                                </a>
                                <small class="text-muted">
                                    <i class="fas fa-calendar-alt me-1"></i>${formatDate(job.created_at)}
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayPagination(totalPages, currentPageNum) {
            const pagination = document.getElementById('pagination');
            const paginationList = pagination.querySelector('.pagination');

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'block';
            let html = '';

            // Previous button
            html += `
                <li class="page-item ${currentPageNum === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPageNum - 1}); return false;">
                        <i class="fas fa-chevron-left me-1"></i>Previous
                    </a>
                </li>
            `;

            // Page numbers with smart truncation
            const maxPagesToShow = 5;
            let startPage = Math.max(1, currentPageNum - 2);
            let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);

            if (endPage - startPage < maxPagesToShow - 1) {
                startPage = Math.max(1, endPage - maxPagesToShow + 1);
            }

            // First page
            if (startPage > 1) {
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="changePage(1); return false;">1</a>
                    </li>
                `;
                if (startPage > 2) {
                    html += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;
                }
            }

            // Page numbers
            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <li class="page-item ${i === currentPageNum ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
                    </li>
                `;
            }

            // Last page
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;
                }
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="changePage(${totalPages}); return false;">${totalPages}</a>
                    </li>
                `;
            }

            // Next button
            html += `
                <li class="page-item ${currentPageNum === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPageNum + 1}); return false;">
                        Next<i class="fas fa-chevron-right ms-1"></i>
                    </a>
                </li>
            `;

            paginationList.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadJobs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearFilters() {
            document.getElementById('keyword').value = '';
            document.getElementById('jobType').value = '';
            document.getElementById('portal').value = '';
            currentPage = 1;
            loadJobs();
        }

        function formatDate(dateString) {
            if (!dateString) return 'Recently';
            
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} months ago`;
            
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function escapeHtml(text) {
            if (!text) return 'Not specified';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
