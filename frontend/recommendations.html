<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Recommendations - AI Job Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-briefcase me-2"></i>AI Job Aggregator
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/upload-resume">Upload Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="/jobs">Browse Jobs</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-star text-warning me-2"></i>Your Job Recommendations</h1>
            <button class="btn btn-primary" id="refreshBtn">
                <i class="fas fa-sync me-2"></i>Refresh
            </button>
        </div>

        <div class="alert alert-info mb-4">
            <i class="fas fa-info-circle me-2"></i>
            These jobs have a <strong>75%+ match</strong> with your resume. They're ranked by similarity score.
        </div>

        <div id="recommendationsContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Loading recommendations...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        checkAuth();
        loadRecommendations();

        async function loadRecommendations() {
            try {
                const recommendations = await apiRequest('/api/recommendations');
                displayRecommendations(recommendations);
            } catch (error) {
                document.getElementById('recommendationsContainer').innerHTML = `
                    <div class="alert alert-danger">
                        <h5>Error loading recommendations</h5>
                        <p>${error.message || 'Please try again later'}</p>
                    </div>
                `;
            }
        }

        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendationsContainer');

            if (recommendations.length === 0) {
                container.innerHTML = `
                    <div class="card text-center py-5">
                        <div class="card-body">
                            <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
                            <h4>No recommendations yet</h4>
                            <p class="text-muted">Upload your resume to get AI-powered job recommendations!</p>
                            <a href="/upload-resume" class="btn btn-primary mt-3">
                                <i class="fas fa-upload me-2"></i>Upload Resume
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = recommendations.map((rec, index) => {
                const matchPercent = (rec.similarity_score * 100).toFixed(1);
                const matchClass = matchPercent >= 90 ? 'success' : matchPercent >= 80 ? 'primary' : 'info';

                return `
                    <div class="card mb-3 shadow-sm recommendation-card">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-1 text-center">
                                    <div class="rank-badge">#${rec.rank_position || index + 1}</div>
                                </div>
                                <div class="col-md-8">
                                    <h5 class="card-title mb-2">${rec.role}</h5>
                                    <p class="text-muted mb-2">
                                        <i class="fas fa-building me-2"></i>${rec.company_name}
                                    </p>
                                    <p class="mb-2">
                                        <span class="badge bg-primary me-2">${rec.opportunity_type}</span>
                                        <span class="badge bg-${matchClass}">${matchPercent}% Match</span>
                                    </p>
                                    <p class="small text-muted mb-0">
                                        <strong>Required Skills:</strong> ${rec.skills || 'Not specified'}
                                    </p>
                                </div>
                                <div class="col-md-3 text-end d-flex flex-column justify-content-center">
                                    <div class="mb-3">
                                        <div class="progress" style="height: 25px;">
                                            <div class="progress-bar bg-${matchClass}" role="progressbar" 
                                                 style="width: ${matchPercent}%"
                                                 aria-valuenow="${matchPercent}" aria-valuemin="0" aria-valuemax="100">
                                                ${matchPercent}%
                                            </div>
                                        </div>
                                    </div>
                                    <a href="${rec.application_link}" target="_blank" class="btn btn-primary">
                                        <i class="fas fa-external-link-alt me-2"></i>Apply Now
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Refresh recommendations
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Refreshing...';

            try {
                await apiRequest('/api/recommendations/regenerate', 'POST');
                await loadRecommendations();
                alert('Recommendations refreshed successfully!');
            } catch (error) {
                alert('Error refreshing recommendations');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync me-2"></i>Refresh';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);
    </script>
</body>
</html>
